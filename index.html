<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalameSystem</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root {
  --bg:      #0a0f1e;
  --surface: #111827;
  --sur2:    #1a2236;
  --border:  #1e3a5f;
  --accent:  #0ea5e9;
  --good:    #22d3a0;
  --danger:  #f87171;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --orange:  #f97316;
  --blue:    #38bdf8;
  --mono:    'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--orange));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
.pill{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--muted);background:var(--sur2);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .4s}
.dot.on{background:var(--good);box-shadow:0 0 6px var(--good);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* LAYOUT */
main{max-width:960px;margin:0 auto;padding:20px 16px;display:grid;gap:14px}

/* MÉTRICAS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.temp::before{background:var(--orange)}
.card.hum::before{background:var(--blue)}
.card.estufa::before{background:var(--orange)}
.card.extractor::before{background:var(--blue)}
.card-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.card-value{font-size:2.6rem;font-weight:800;font-family:var(--mono);line-height:1}
.card.temp .card-value{color:var(--orange)}
.card.hum  .card-value{color:var(--blue)}
.card-sub{margin-top:8px;font-size:.75rem;color:var(--muted)}
.card-sub b{color:var(--text)}

/* RELÉS */
.rele-row{display:flex;align-items:center;justify-content:space-between}
.rele-name{font-weight:700;font-size:.95rem}
.rele-desc{font-size:.72rem;color:var(--muted);margin-top:2px}
.badge{font-size:.68rem;font-weight:700;letter-spacing:.05em;padding:4px 12px;border-radius:20px;background:var(--sur2);color:var(--muted);border:1px solid var(--border);transition:all .3s}
.badge.on-e{background:rgba(249,115,22,.15);color:var(--orange);border-color:var(--orange)}
.badge.on-x{background:rgba(56,189,248,.15);color:var(--blue);border-color:var(--blue)}
.card.rele-on-e{border-color:var(--orange);background:rgba(249,115,22,.04)}
.card.rele-on-x{border-color:var(--blue);background:rgba(56,189,248,.04)}

/* UMBRALES */
.umbral{font-family:var(--mono);font-size:.88rem;margin-top:6px}
.umbral .on-label{color:var(--good);font-weight:700}
.umbral .off-label{color:var(--muted);font-weight:700}

/* GRÁFICOS */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.chart-title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.tabs{display:flex;gap:4px}
.tab{background:var(--sur2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 9px;font-size:.7rem;cursor:pointer;transition:all .15s}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chart-wrap{position:relative;height:200px}

/* IP */
.ip-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;font-size:.82rem;color:var(--muted)}
.ip-val{font-family:var(--mono);color:var(--accent);font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--sur2);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:8px;font-size:.82rem;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--good);color:var(--good)}
.toast.err{border-color:var(--danger);color:var(--danger)}

@media(max-width:480px){.grid2{grid-template-columns:1fr}.card-value{font-size:2rem}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🥩</div>
    <span>SalameSystem</span>
  </div>
  <div class="pill">
    <div class="dot" id="dot"></div>
    <span id="status-text">Conectando…</span>
  </div>
</header>

<main>

  <!-- TEMPERATURA Y HUMEDAD -->
  <div class="grid2">
    <div class="card temp">
      <div class="card-label">🌡️ Temperatura</div>
      <div class="card-value" id="val-temp">--.-</div>
      <div class="card-sub">SP: <b id="sp-temp">--</b>°C ± <b id="ht">--</b>°C</div>
      <div class="umbral">
        <span class="on-label">ON</span> &lt; <span id="u-t-on">--</span>°C
        &nbsp;·&nbsp;
        <span class="off-label">OFF</span> &gt; <span id="u-t-off">--</span>°C
      </div>
    </div>
    <div class="card hum">
      <div class="card-label">💧 Humedad</div>
      <div class="card-value" id="val-hum">--.-</div>
      <div class="card-sub">SP: <b id="sp-hum">--</b>% ± <b id="hh">--</b>%</div>
      <div class="umbral">
        <span class="on-label">ON</span> &gt; <span id="u-h-on">--</span>%
        &nbsp;·&nbsp;
        <span class="off-label">OFF</span> &lt; <span id="u-h-off">--</span>%
      </div>
    </div>
  </div>

  <!-- RELÉS -->
  <div class="grid2">
    <div class="card estufa" id="card-estufa">
      <div class="rele-row">
        <div>
          <div class="rele-name">🔥 Estufa</div>
          <div class="rele-desc">Histéresis temperatura</div>
        </div>
        <div class="badge" id="badge-estufa">OFF</div>
      </div>
    </div>
    <div class="card extractor" id="card-extractor">
      <div class="rele-row">
        <div>
          <div class="rele-name">💨 Extractor</div>
          <div class="rele-desc">Histéresis humedad</div>
        </div>
        <div class="badge" id="badge-extractor">OFF</div>
      </div>
    </div>
  </div>

  <!-- GRÁFICO TEMP/HUM -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Temperatura y Humedad</div>
      <div class="tabs">
        <button class="tab active" data-r="30"  onclick="setRango(30,this)">30m</button>
        <button class="tab"        data-r="60"  onclick="setRango(60,this)">1h</button>
        <button class="tab"        data-r="360" onclick="setRango(360,this)">6h</button>
        <button class="tab"        data-r="1440"onclick="setRango(1440,this)">24h</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chart-th"></canvas></div>
  </div>

  <!-- GRÁFICO RELÉS -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Historial Estufa y Extractor</div>
    </div>
    <div class="chart-wrap"><canvas id="chart-reles"></canvas></div>
  </div>

  <!-- IP -->
  <div class="ip-card">
    <span>IP del controlador</span>
    <span class="ip-val" id="ip-val">--</span>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:            "AIzaSyBU5fxVnZ8HGJwd8coE1M4wj8TLKPUDfIg",
  authDomain:        "salamesystem-2ec66.firebaseapp.com",
  databaseURL:       "https://salamesystem-2ec66-default-rtdb.firebaseio.com",
  projectId:         "salamesystem-2ec66",
  storageBucket:     "salamesystem-2ec66.firebasestorage.app",
  messagingSenderId: "542477774980",
  appId:             "1:542477774980:web:ba2bca3520bae1f53dd2d1"
});
const db = firebase.database();

let rangoMin = 30;

// ── GRÁFICO TEMP/HUM ──
const chartTH = new Chart(document.getElementById('chart-th').getContext('2d'), {
  type: 'line',
  data: { datasets: [
    { label:'Temp (°C)', data:[], borderColor:'#f97316', backgroundColor:'rgba(249,115,22,.07)', borderWidth:2, pointRadius:0, tension:0.3, fill:true, yAxisID:'yT' },
    { label:'Hum (%)',   data:[], borderColor:'#38bdf8', backgroundColor:'rgba(56,189,248,.07)',  borderWidth:2, pointRadius:0, tension:0.3, fill:true, yAxisID:'yH' }
  ]},
  options: {
    responsive:true, maintainAspectRatio:false,
    interaction:{ mode:'index', intersect:false },
    plugins:{ legend:{ labels:{ color:'#94a3b8', boxWidth:12, font:{size:11} } }, tooltip:{ backgroundColor:'#1a2236', borderColor:'#1e3a5f', borderWidth:1, titleColor:'#e2e8f0', bodyColor:'#94a3b8' } },
    scales:{
      x:{ type:'time', time:{ unit:'minute', displayFormats:{minute:'HH:mm'} }, grid:{color:'#1e3a5f'}, ticks:{color:'#64748b', maxTicksLimit:6} },
      yT:{ position:'left',  grid:{color:'#1e3a5f'}, ticks:{color:'#f97316', callback:v=>v+'°'} },
      yH:{ position:'right', grid:{drawOnChartArea:false}, ticks:{color:'#38bdf8', callback:v=>v+'%'}, min:0, max:100 }
    }
  }
});

// ── GRÁFICO RELÉS (escalón) ──
const chartReles = new Chart(document.getElementById('chart-reles').getContext('2d'), {
  type: 'line',
  data: { datasets: [
    { label:'Estufa',    data:[], borderColor:'#f97316', backgroundColor:'rgba(249,115,22,.15)', borderWidth:2, pointRadius:0, stepped:true, fill:true, yAxisID:'yR' },
    { label:'Extractor', data:[], borderColor:'#38bdf8', backgroundColor:'rgba(56,189,248,.15)',  borderWidth:2, pointRadius:0, stepped:true, fill:true, yAxisID:'yR' }
  ]},
  options: {
    responsive:true, maintainAspectRatio:false,
    interaction:{ mode:'index', intersect:false },
    plugins:{ legend:{ labels:{ color:'#94a3b8', boxWidth:12, font:{size:11} } }, tooltip:{ backgroundColor:'#1a2236', borderColor:'#1e3a5f', borderWidth:1, titleColor:'#e2e8f0', bodyColor:'#94a3b8', callbacks:{ label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y ? 'ON' : 'OFF') } } },
    scales:{
      x:{ type:'time', time:{ unit:'minute', displayFormats:{minute:'HH:mm'} }, grid:{color:'#1e3a5f'}, ticks:{color:'#64748b', maxTicksLimit:6} },
      yR:{ position:'left', grid:{color:'#1e3a5f'}, min:0, max:1.2, ticks:{ color:'#64748b', callback:v=>v===1?'ON':v===0?'OFF':'' } }
    }
  }
});

// ── DATOS EN TIEMPO REAL ──
db.ref('/datos/actual').on('value', snap => {
  const d = snap.val();
  if (!d) return;

  document.getElementById('val-temp').textContent = (+d.t).toFixed(1);
  document.getElementById('val-hum').textContent  = (+d.h).toFixed(1);
  document.getElementById('sp-temp').textContent  = d.st;
  document.getElementById('sp-hum').textContent   = d.sh;
  document.getElementById('ht').textContent       = d.ht;
  document.getElementById('hh').textContent       = d.hh;
  document.getElementById('ip-val').textContent   = d.ip || '--';

  const st=+d.st, ht=+d.ht, sh=+d.sh, hh=+d.hh;
  document.getElementById('u-t-on').textContent  = (st-ht).toFixed(1);
  document.getElementById('u-t-off').textContent = (st+ht).toFixed(1);
  document.getElementById('u-h-on').textContent  = (sh+hh).toFixed(1);
  document.getElementById('u-h-off').textContent = (sh-hh).toFixed(1);

  setBadge('estufa',    d.e, 'e');
  setBadge('extractor', d.x, 'x');

  document.getElementById('dot').className = 'dot on';
  document.getElementById('status-text').textContent = 'En vivo';
});

// ── HISTÓRICO ──
function setRango(min, btn) {
  rangoMin = min;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  cargarHistorico();
}

function cargarHistorico() {
  const limite = Math.ceil(rangoMin * 6) + 10; // cada 10s → 6 por minuto
  db.ref('/datos/historico').limitToLast(limite).once('value', snap => {
    const arr = [];
    snap.forEach(child => {
      const v = child.val();
      arr.push({
        ts:   v.ts   || 0,
        temp: v.t    != null ? +v.t : 0,
        hum:  v.h    != null ? +v.h : 0,
        e:    v.e    ? 1 : 0,
        x:    v.x    ? 1 : 0,
      });
    });

    // Reconstruir timestamps reales desde el último punto
    const now = Date.now();
    const total = arr.length;

    chartTH.data.datasets[0].data = arr.map((v,i) => ({ x: now-(total-i)*10000, y: v.temp }));
    chartTH.data.datasets[1].data = arr.map((v,i) => ({ x: now-(total-i)*10000, y: v.hum  }));
    chartTH.update('none');

    chartReles.data.datasets[0].data = arr.map((v,i) => ({ x: now-(total-i)*10000, y: v.e }));
    chartReles.data.datasets[1].data = arr.map((v,i) => ({ x: now-(total-i)*10000, y: v.x }));
    chartReles.update('none');
  });
}

cargarHistorico();
setInterval(cargarHistorico, 30000);

// ── UI HELPERS ──
function setBadge(id, on, tipo) {
  const badge = document.getElementById('badge-' + id);
  const card  = document.getElementById('card-'  + id);
  badge.textContent = on ? 'ON' : 'OFF';
  badge.className   = 'badge' + (on ? ' on-'+tipo : '');
  card.className    = 'card ' + id + (on ? ' rele-on-'+tipo : '');
}

let toastT;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type||'');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3000);
}

setTimeout(() => {
  if (!document.getElementById('dot').classList.contains('on'))
    document.getElementById('status-text').textContent = 'Sin datos';
}, 10000);
</script>
</body>
</html>
